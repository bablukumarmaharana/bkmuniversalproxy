<svg xmlns="http://www.w3.org/2000/svg" width="800" height="230" viewBox="0 0 800 230">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a" />
      <stop offset="100%" stop-color="#1a1a3a" />
    </linearGradient>

    <!-- Animated Rainbow Gradient for Text -->
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="-1" stop-color="#ff6b6b">
        <animate attributeName="offset" values="-1;1" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="0" stop-color="#feca57">
        <animate attributeName="offset" values="-0.5;1.5" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="0.5" stop-color="#48dbfb">
        <animate attributeName="offset" values="0;2" dur="5s" repeatCount="indefinite" />
      </stop>
      <stop offset="1.5" stop-color="#ff9ff3">
        <animate attributeName="offset" values="0.5;2.5" dur="5s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Subtle Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="230" rx="16" fill="url(#bg)" />
  <rect width="800" height="230" rx="16" fill="url(#grid)" />

  <!-- Animated Orbiting Rings -->
  <g transform="translate(400, 115)">
    <!-- Ring 1 -->
    <ellipse cx="0" cy="0" rx="280" ry="60" fill="none" stroke="#48dbfb" stroke-width="1.5" opacity="0.15">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite" />
    </ellipse>
    <!-- Ring 2 -->
    <ellipse cx="0" cy="0" rx="180" ry="80" fill="none" stroke="#ff9ff3" stroke-width="1" opacity="0.1">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s" repeatCount="indefinite" />
    </ellipse>
  </g>

  <!-- Floating Particles (Stars) -->
  <circle cx="120" cy="60" r="2" fill="#fff">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
    <animate attributeName="cy" values="60;50;60" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="680" cy="40" r="3" fill="#feca57">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite" />
    <animate attributeName="cy" values="40;50;40" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="80" cy="180" r="1.5" fill="#ff6b6b">
    <animate attributeName="opacity" values="0.1;0.8;0.1" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="cy" values="180;170;180" dur="3.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="720" cy="190" r="2.5" fill="#48dbfb">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite" />
    <animate attributeName="cy" values="190;200;190" dur="6s" repeatCount="indefinite" />
  </circle>
  <circle cx="400" cy="20" r="1" fill="#fff">
    <animate attributeName="opacity" values="0;0.9;0" dur="3s" repeatCount="indefinite" />
    <animate attributeName="cy" values="20;15;20" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Main Title -->
  <text x="400" y="80" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="46" font-weight="900" text-anchor="middle" fill="url(#rainbow)" filter="url(#neonGlow)" letter-spacing="3">
    BKMUniversalProxy
  </text>

  <!-- Animated Sweeping Glow Line Under Title -->
  <rect x="200" y="95" width="400" height="3" rx="1.5" fill="#feca57" filter="url(#softGlow)">
    <animate attributeName="width" values="0;400;0" dur="4s" repeatCount="indefinite" />
    <animate attributeName="x" values="400;200;400" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- Moving Dot on the line -->
  <circle r="4" fill="#ff9ff3" filter="url(#neonGlow)">
    <animate attributeName="cx" values="200;600;200" dur="4s" repeatCount="indefinite" />
    <animate attributeName="cy" values="96.5;96.5;96.5" dur="4s" repeatCount="indefinite" />
  </circle>

  <!-- Subtitle: Protocols -->
  <text x="400" y="140" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#dfe6e9" letter-spacing="1">
    🌐 HTTP · HTTPS · HTTP/2 · SOCKS4(A) · SOCKS5
  </text>

  <!-- Tagline -->
  <text x="400" y="170" font-family="'Segoe UI', Arial, sans-serif" font-size="15" text-anchor="middle" fill="#a0aec0" letter-spacing="0.5">
    📦 One port · Any Linux · Zero deps · Pure Python
  </text>

  <!-- Version & Footer -->
  <text x="400" y="205" font-family="'Segoe UI', Arial, sans-serif" font-size="12" text-anchor="middle" fill="#718096" letter-spacing="2">
    v1.0 · 2026
  </text>

  <!-- Outer Glowing Border -->
  <rect x="5" y="5" width="790" height="220" rx="12" fill="none" stroke="url(#rainbow)" stroke-width="2" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite" />
  </rect>
</svg>
